apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  labels:
    app: chroma
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  labels:
    app: chroma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
    spec:
      enableServiceLinks: false
      containers:
        - name: chroma
          image: chromadb/chroma:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chroma
  labels:
    app: chroma
spec:
  type: ClusterIP
  selector:
    app: chroma
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
