apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: gateway
        metrics_path: /metrics
        scrape_interval: 5s
        static_configs:
          - targets:
              - gateway.default.svc.cluster.local:8000
---
apiVersion: v1
kind: Pod
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  enableServiceLinks: false
  securityContext:
    fsGroup: 65534
  containers:
    - name: prometheus
      image: prom/prometheus:v2.51.2
      imagePullPolicy: IfNotPresent
      args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
      ports:
        - name: http
          containerPort: 9090
          protocol: TCP
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      readinessProbe:
        httpGet:
          path: /-/ready
          port: http
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /-/healthy
          port: http
        initialDelaySeconds: 15
        periodSeconds: 10
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
          readOnly: true
        - name: data
          mountPath: /prometheus
  volumes:
    - name: config
      configMap:
        name: prometheus-config
    - name: data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
